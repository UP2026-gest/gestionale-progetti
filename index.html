<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionale Progetti — UP · MSF · Studio Piazza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand"><span class="b-up">UP</span><span class="b-dot">·</span><span class="b-msf">MSF</span><span class="b-dot">·</span><span class="b-sp">SP</span></div>
    <h1>Gestionale Progetti</h1>
    <p class="login-sub">Chi sei?</p>
    <div class="user-grid">
      <button class="user-btn" onclick="login('Renato')"><div class="av av-r">R</div>Renato</button>
      <button class="user-btn" onclick="login('Stefania')"><div class="av av-s">S</div>Stefania</button>
      <button class="user-btn" onclick="login('Matteo')"><div class="av av-m">M</div>Matteo</button>
    </div>
  </div>
  <!-- TOKEN BOX -->
  <div id="token-box" class="hidden" style="margin-top:24px;text-align:left">
    <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:#1a1916">Token GitHub <span style="font-weight:400;font-size:12px;color:#a09e98">(salvato nel browser)</span></div>
    <input type="password" id="token-field" placeholder="Incolla il token ghp_..." autocomplete="off"
      style="width:100%;padding:10px 12px;border:1.5px solid #e8e6df;border-radius:8px;font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:8px"
      onkeydown="if(event.key==='Enter') salvaToken()">
    <button onclick="salvaToken()" style="width:100%;padding:10px;background:#1a1916;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer">Conferma e accedi</button>
    <p style="font-size:11px;color:#a09e98;margin-top:8px;line-height:1.5">Il token viene salvato solo nel tuo browser e non viene mai caricato su GitHub.</p>
  </div>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <header>
    <div class="header-left">
      <div class="brand"><span class="b-up">UP</span><span class="b-dot">·</span><span class="b-msf">MSF</span><span class="b-dot">·</span><span class="b-sp">SP</span></div>
      <nav>
        <button class="nav-btn active" onclick="setView('lista',this)">Lista</button>
        <button class="nav-btn" onclick="setView('kanban',this)">Kanban</button>
        <button class="nav-btn" onclick="setView('dashboard',this)">Dashboard</button>
      </nav>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="mostraAllarmi()" title="Scadenze"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span id="allarmi-badge" class="badge hidden"></span></button>
      <button class="icon-btn" onclick="esporta()" title="Esporta CSV"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
      <button class="btn-primary" onclick="apriForm(null)">+ Nuovo progetto</button>
      <div class="user-chip" onclick="logout()"><div class="av-sm" id="av-hdr"></div><span id="user-hdr"></span></div>
    </div>
  </header>

  <div class="filtri">
    <input type="text" id="q" placeholder="Cerca…" oninput="render()">
    <select id="f-soc" onchange="render()"><option value="">Tutte le società</option><option>UP</option><option>MSF</option><option>Studio Piazza</option><option>UP + MSF</option><option>UP + Studio Piazza</option><option>MSF + Studio Piazza</option><option>UP + MSF + Studio Piazza</option></select>
    <select id="f-res" onchange="render()"><option value="">Tutti i responsabili</option><option>Renato</option><option>Stefania</option><option>Matteo</option><option>Tutti</option></select>
    <select id="f-sta" onchange="render()"><option value="">Tutti gli stati</option><option>Primo contatto</option><option>Proposta in preparazione</option><option>Attesa riscontro</option><option>Sospesa</option><option>Chiusa vinta</option><option>Chiusa persa</option></select>
    <select id="f-sca" onchange="render()"><option value="">Qualsiasi scadenza</option><option value="scadute">Scadute</option><option value="oggi">Scade oggi</option><option value="3g">Entro 3 giorni</option><option value="7g">Entro 7 giorni</option><option value="30g">Entro 30 giorni</option></select>
    <button class="btn-reset" onclick="resetFiltri()">✕ Reset</button>
  </div>

  <div id="view-lista" class="view">
    <div class="lista-hdr">
      <span>Società</span><span>Progetto</span><span>Responsabile</span><span>Stato</span><span>Scadenza</span><span>Azioni</span>
    </div>
    <div id="lista-body"></div>
  </div>

  <div id="view-kanban" class="view hidden">
    <div id="kanban"></div>
  </div>

  <div id="view-dashboard" class="view hidden">
    <div id="dashboard"></div>
  </div>

</div>

<!-- PANNELLO LATERALE -->
<div id="panel-overlay" class="overlay hidden" onclick="chiudiPanel()"></div>
<div id="panel" class="panel hidden">
  <div id="panel-inner"></div>
</div>

<!-- MODAL FORM PROGETTO -->
<div id="modal-overlay" class="overlay hidden" onclick="chiudiForm()"></div>
<div id="modal" class="modal hidden">
  <div class="modal-hdr">
    <h3 id="modal-title">Nuovo progetto</h3>
    <button onclick="chiudiForm()" class="x-btn">✕</button>
  </div>
  <div class="modal-body">
    <div class="fg-grid">
      <div class="fg"><label>Società</label><select id="m-soc"><option>UP</option><option>MSF</option><option>Studio Piazza</option><option>UP + MSF</option><option>UP + Studio Piazza</option><option>MSF + Studio Piazza</option><option>UP + MSF + Studio Piazza</option></select></div>
      <div class="fg"><label>Responsabile</label><select id="m-res"><option>Renato</option><option>Stefania</option><option>Matteo</option><option>Renato + Stefania</option><option>Renato + Matteo</option><option>Stefania + Matteo</option><option>Tutti</option></select></div>
      <div class="fg full"><label>Oggetto / Iniziativa *</label><input type="text" id="m-ogg" placeholder="Nome del progetto"></div>
      <div class="fg full"><label>Obiettivo</label><input type="text" id="m-obj" placeholder="Obiettivo dell'iniziativa"></div>
      <div class="fg"><label>Stato</label><select id="m-sta"><option>Primo contatto</option><option>Proposta in preparazione</option><option>Attesa riscontro</option><option>Sospesa</option><option>Chiusa vinta</option><option>Chiusa persa</option></select></div>
      <div class="fg"><label>Proposta fatta</label><select id="m-pro"><option>No</option><option>Sì</option><option>In preparazione</option></select></div>
      <div class="fg"><label>Data inizio</label><input type="text" id="m-ini" placeholder="GG/MM/AAAA" maxlength="10" onblur="formatDateInput(this)"></div>
      <div class="fg"><label>Scadenza</label><input type="text" id="m-sca" placeholder="GG/MM/AAAA" maxlength="10" onblur="formatDateInput(this)"></div>
      <div class="fg"><label>Strumenti</label><input type="text" id="m-str" placeholder="es. CRM, LinkedIn…"></div>
      <div class="fg"><label>Costi (€)</label><input type="number" id="m-cos" placeholder="0" min="0"></div>
      <div class="fg full"><label>Note</label><textarea id="m-not" rows="3"></textarea></div>
    </div>
  </div>
  <div class="modal-ftr">
    <button class="btn-sec" onclick="chiudiForm()">Annulla</button>
    <button class="btn-primary" onclick="salvaProgetto()">Salva</button>
  </div>
</div>

<!-- POPUP ALLARMI -->
<div id="popup" class="popup hidden">
  <div class="popup-hdr">
    <div><strong>⚠ Attenzione scadenze</strong><br><span id="popup-sub" style="font-size:12px;color:#888"></span></div>
    <button onclick="chiudiPopup()" class="x-btn">✕</button>
  </div>
  <div id="popup-list"></div>
  <div class="popup-ftr"><button class="btn-sec" onclick="chiudiPopup()">Chiudi</button></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
